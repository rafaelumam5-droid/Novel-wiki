<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 WIKI NOVEL DATABASE</title>

    <script>
        var password = prompt("Masukkan Kata Sandi untuk Melihat Konten:");
        if (password !== "MORPT") { 
            alert("Kata sandi salah!");
            window.location.href = "https://github.com"; 
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // Konfigurasi Firebase asli dari akun Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBw4nrBcyiIO6Kic8y26GIXQ8plK8aQouw",
            authDomain: "wiki-novel.firebaseapp.com",
            databaseURL: "https://wiki-novel-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wiki-novel",
            storageBucket: "wiki-novel.firebasestorage.app",
            messagingSenderId: "35934478405",
            appId: "1:35934478405:web:b895bcbc73c321dac1432c",
            measurementId: "G-97J07XT168"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #0f0f0f;
            color: white;
        }
        header {
            background: #181818;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        header h1 {
            color: #ffffff;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        h2 {
            margin-bottom: 10px;
        }
        input, textarea {
            width: 100%;
            background: #111;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        button {
            background: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 2px;
        }
        button:hover {
            background: #666;
        }
        .bab, .character {
            padding: 10px;
            margin-top: 10px;
            background: #151515;
            border-radius: 5px;
            border: 1px solid #333;
        }
        .stat {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .box {
            flex: 1;
            min-width: 150px;
            background: #161616;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        a {
            color: #7db4ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>📚 WIKI NOVEL DATABASE</h1>
        <p>Memulai Hidup Baru di Dunia Lain</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Dashboard</h2>
            <div class="stat">
                <div class="box">
                    <h3 id="babCount">0</h3>
                    <p>Total Bab</p>
                </div>
                <div class="box">
                    <h3 id="charCount">0</h3>
                    <p>Karakter</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🤖 ChatGPT</h2>
            <a href="https://chatgpt.com" target="_blank">
                <button>Buka ChatGPT</button>
            </a>
        </div>

        <div class="card">
            <h2>➕ Tambah Bab</h2>
            <input type="text" id="judulBab" placeholder="Judul Bab">
            <textarea id="isiBab" rows="8" placeholder="Tulis isi bab..."></textarea>
            <button onclick="tambahBab()">Simpan Bab</button>
        </div>

        <div class="card">
            <h2>📖 Daftar Bab</h2>
            <div id="daftarBab">Memuat data bab dari cloud...</div>
        </div>

        <div class="card">
            <h2>👤 Tambah Karakter</h2>
            <input type="text" id="namaKarakter" placeholder="Nama Karakter">
            <textarea id="infoKarakter" placeholder="Deskripsi karakter"></textarea>
            <button onclick="tambahKarakter()">Simpan Karakter</button>
        </div>

        <div class="card">
            <h2>👥 Database Karakter</h2>
            <div id="karakterList">Memuat data karakter dari cloud...</div>
        </div>
    </div>

    <script>
        let bab = [];
        let karakter = [];

        // Langsung dengarkan perubahan data Bab di Firebase secara Realtime
        database.ref('wiki/bab').on('value', (snapshot) => {
            bab = snapshot.val() || [];
            tampilkanBab();
        });

        // Langsung dengarkan perubahan data Karakter di Firebase secara Realtime
        database.ref('wiki/karakter').on('value', (snapshot) => {
            karakter = snapshot.val() || [];
            tampilkanKarakter();
        });

        function updateDashboard(){
            document.getElementById("babCount").innerText = bab.length;
            document.getElementById("charCount").innerText = karakter.length;
        }

        function simpanKeCloud(path, data) {
            database.ref(path).set(data);
        }

        function tambahBab(){
            let judul = document.getElementById("judulBab").value;
            let isi = document.getElementById("isiBab").value;

            if(judul=="" || isi==""){
                alert("Isi semua data!");
                return;
            }

            bab.push({ judul: judul, isi: isi });
            simpanKeCloud('wiki/bab', bab);

            document.getElementById("judulBab").value="";
            document.getElementById("isiBab").value="";
        }

        function tampilkanBab(){
            let html="";
            if(bab.length === 0) {
                html = "<p>Belum ada bab di database cloud.</p>";
            } else {
                bab.forEach((b, index)=>{
                    if(b) { // Validasi jika ada data kosong/null
                        html+= `
                        <div class="bab">
                            <h3>${b.judul}</h3>
                            <p>${b.isi.replace(/\n/g,"<br>")}</p>
                            <button onclick="editBab(${index})">Edit</button>
                            <button onclick="hapusBab(${index})">Hapus</button>
                        </div>`;
                    }
                });
            }
            document.getElementById("daftarBab").innerHTML = html;
            updateDashboard();
        }

        function hapusBab(index){
            if(confirm("Hapus bab ini dari cloud?")){
                bab.splice(index, 1);
                simpanKeCloud('wiki/bab', bab);
            }
        }

        function editBab(index){
            let judul = prompt("Edit Judul", bab[index].judul);
            if(judul===null) return;

            let isi = prompt("Edit Isi", bab[index].isi);
            if(isi===null) return;

            bab[index].judul = judul;
            bab[index].isi = isi;

            simpanKeCloud('wiki/bab', bab);
        }

        function tambahKarakter(){
            let nama = document.getElementById("namaKarakter").value;
            let info = document.getElementById("infoKarakter").value;

            if(nama=="" || info==""){
                alert("Isi semua data!");
                return;
            }

            karakter.push({ nama: nama, info: info });
            simpanKeCloud('wiki/karakter', karakter);

            document.getElementById("namaKarakter").value="";
            document.getElementById("infoKarakter").value="";
        }

        function tampilkanKarakter(){
            let html="";
            if(karakter.length === 0) {
                html = "<p>Belum ada karakter di database cloud.</p>";
            } else {
                karakter.forEach((k, index)=>{
                    if(k) { // Validasi jika ada data kosong/null
                        html+= `
                        <div class="character">
                            <h3>${k.nama}</h3>
                            <p>${k.info.replace(/\n/g,"<br>")}</p>
                            <button onclick="hapusKarakter(${index})">Hapus</button>
                        </div>`;
                    }
                });
            }
            document.getElementById("karakterList").innerHTML = html;
            updateDashboard();
        }

        function hapusKarakter(index){
            if(confirm("Hapus karakter ini dari cloud?")){
                karakter.splice(index, 1);
                simpanKeCloud('wiki/karakter', karakter);
            }
        }
    </script>
</body>
</html>
