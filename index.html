<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 WIKI NOVEL MASTER DATABASE</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (prompt("Masukkan Kata Sandi Master:") !== "MORPT") { alert("Salah!"); window.location.href = "https://github.com"; }
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBw4nrBcyiIO6Kic8y26GIXQ8plK8aQouw", authDomain: "wiki-novel.firebaseapp.com",
            databaseURL: "https://wiki-novel-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wiki-novel", storageBucket: "wiki-novel.firebasestorage.app",
            messagingSenderId: "35934478405", appId: "1:35934478405:web:644e00c8724835d9c1432c"
        };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
    </script>
</head>
<body>

    <header>
        <h1>📚 WIKI NOVEL <span>MASTER ENGINE</span></h1>
        <p>Proyek Eksklusif: Memulai Hidup Baru di Dunia Lain</p>
    </header>

    <div class="wiki-layout">
        <div class="nav-tabs" id="menuUtama"></div>
        <div class="container" id="kontenUtama">
            
            <div id="tab-beranda" class="tab-content active">
                <div class="card">
                    <h2>Status Proyek Utama</h2>
                    <label>Judul Novel</label><input type="text" value="Memulai Hidup Baru di Dunia Lain" readonly>
                    <label>Versi Canon Terbaru</label>
                    <div style="display: flex; gap: 10px;"><input type="text" id="metaVersi" placeholder="v1.0.0"><button onclick="updateMetaVersi()" class="btn-primary">Update</button></div>
                </div>
                <div class="card">
                    <h2>Live Cloud Database Stats</h2>
                    <div class="grid-stats">
                        <div class="stat-box"><p style="color:#ff944d; font-size:0.75rem;">DB STATUS</p><h4 style="color:#22c55e; margin-top:5px;">ONLINE</h4></div>
                        <div class="stat-box"><p style="color:#ff944d; font-size:0.75rem;">TOTAL BAB</p><h3 id="statBab">0</h3></div>
                        <div class="stat-box"><p style="color:#ff944d; font-size:0.75rem;">KARAKTER</p><h3 id="statChar">0</h3></div>
                        <div class="stat-box"><p style="color:#ff944d; font-size:0.75rem;">VERSI</p><h4 id="statVersi" style="color:#ff6600; margin-top:5px;">v1.0.0</h4></div>
                    </div>
                </div>
                <div class="card"><h2>🤖 Integrasi AI</h2><a href="https://chatgpt.com" target="_blank"><button class="btn-primary">Buka ChatGPT Asisten</button></a></div>
            </div>

            <div id="generatorForm"></div>

        </div>
    </div>

    <script>
        // STRUKTUR DATA KONFIGURASI KATEGORI (Sangat Fleksibel & Bebas Ditulis)
        const susunanTab = [
            { id: "beranda", nama: "BERANDA" },
            { id: "canon", nama: "CANON UTAMA", fields: [{id:"kategori", label:"Kategori / Topik"}, {id:"konten", label:"Uraian Isi Konten", tipe:"textarea"}] },
            { id: "karakter", nama: "KARAKTER", fields: [{id:"jenis", label:"Jenis Tokoh (Utama/Pendukung)"}, {id:"nama", label:"Nama Karakter"}, {id:"status", label:"Status (Hidup/Mati)"}, {id:"afiliasi", label:"Afiliasi / Fraksi"}, {id:"skill", label:"Kemampuan / Sihir"}, {id:"riwayat", label:"Riwayat / Latar Belakang", tipe:"textarea"}] },
            { id: "organisasi", nama: "ORGANISASI", fields: [{id:"nama", label:"Nama Organisasi / Fraksi (Bebas Tulis)"}, {id:"tujuan", label:"Tujuan / Visi"}, {id:"anggota", label:"Anggota Kunci"}, {id:"sejarah", label:"Sejarah Berdiri", tipe:"textarea"}] },
            { id: "dunia", nama: "DUNIA & RAS", fields: [{id:"kategori", label:"Jenis (Lokasi/Ras/Sejarah)"}, {id:"konten", label:"Penjelasan Spesifikasi", tipe:"textarea"}] },
            { id: "timeline", nama: "TIMELINE", fields: [{id:"kategori", label:"Pembagian Plot Waktu"}, {id:"konten", label:"Ringkasan Kronologi Peristiwa", tipe:"textarea"}] },
            { id: "database_bab", nama: "DATABASE BAB", fields: [{id:"no", label:"Nomor Bab"}, {id:"judul", label:"Judul Bab Resmi"}, {id:"karakter", label:"Karakter yang Hadir"}, {id:"eventPenting", label:"Peristiwa Kunci"}, {id:"ringkasan", label:"Ringkasan Cerita", tipe:"textarea"}] },
            { id: "power", nama: "SISTEM KEKUATAN", fields: [{id:"kategori", label:"Parameter Kekuatan / Elemen"}, {id:"konten", label:"Uraian Aturan Magic", tipe:"textarea"}] },
            { id: "hubungan", nama: "HUBUNGAN", fields: [{id:"kategori", label:"Jenis Hubungan Konten"}, {id:"konten", label:"Detail Interaksi Plot", tipe:"textarea"}] },
            { id: "fakta", nama: "FAKTA PENTING", fields: [{id:"kategori", label:"Klasifikasi Fakta / Misteri"}, {id:"konten", label:"Uraian Fakta Kejadian", tipe:"textarea"}] },
            { id: "changelog", nama: "CHANGELOG", fields: [{id:"kategori", label:"Bagian yang Direvisi"}, {id:"konten", label:"Detail Perubahan Skenario", tipe:"textarea"}] },
            { id: "arsip", nama: "ARSIP IDE", fields: [{id:"kategori", label:"Kategori Ide Cadangan"}, {id:"konten", label:"Coretan Pikiran Kreatif", tipe:"textarea"}] }
        ];

        // OTOMATISASI GENERATOR MENU & FORM INPUT
        let htmlMenu = "", htmlForm = "";
        susunanTab.forEach((tab, idx) => {
            htmlMenu += `<button class="tab-btn ${idx===0?'active':''}" onclick="switchTab('${tab.id}')">${tab.nama}</button>`;
            if (tab.fields) {
                let fieldsHtml = tab.fields.map(f => `
                    <label>${f.label}</label>
                    ${f.tipe==='textarea' ? `<textarea data-field="${f.id}" rows="4"></textarea>` : `<input type="text" data-field="${f.id}">`}
                `).join('');
                
                htmlForm += `
                    <div id="tab-${tab.id}" class="tab-content">
                        <div class="card">
                            <h2>${tab.nama}</h2>
                            ${fieldsHtml}
                            <button onclick="simpanData('${tab.id}')" class="btn-primary">Simpan Konten</button>
                        </div>
                        <div class="card"><h2>Arsip Data Terkunci</h2><div id="list-${tab.id}"></div></div>
                    </div>`;
            }
        });
        document.getElementById("menuUtama").innerHTML = htmlMenu;
        document.getElementById("generatorForm").innerHTML = htmlForm;

        function switchTab(id) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if (event && event.currentTarget) event.currentTarget.classList.add('active');
        }

        // KONEKSI REALTIME META VERSI
        database.ref('wiki/meta_versi').on('value', snap => {
            let v = snap.val() || "v1.0.0";
            document.getElementById("metaVersi").value = v; document.getElementById("statVersi").innerText = v;
        });
        function updateMetaVersi() { database.ref('wiki/meta_versi').set(document.getElementById("metaVersi").value, err => {!err && alert("Versi diperbarui!");}); }

        // SATU FUNGSI UNTUK MENYIMPAN SEMUA JENIS KATEGORI
        function simpanData(node) {
            let container = document.getElementById(`tab-${node}`);
            let inputs = container.querySelectorAll('[data-field]');
            let dataBaru = { waktu: new Date().toLocaleString('id-ID') };
            let valid = true;

            inputs.forEach(input => {
                let val = input.value.trim();
                if (!val) valid = false;
                dataBaru[input.getAttribute('data-field')] = val;
            });

            if (!valid) return alert("Mohon isi semua kolom inputan!");

            database.ref('wiki/' + node).push(dataBaru, err => {
                if (!err) {
                    alert("Sukses tersimpan di Cloud!");
                    inputs.forEach(input => input.value = "");
                }
            });
        }

        // SATU ENGINE LISTENER UNTUK MENAMPILKAN DAN MENGHAPUS DATA SEMUA KATEGORI
        function pasangSinkronisasi(node) {
            let konfigurasi = susunanTab.find(t => t.id === node);
            database.ref('wiki/' + node).on('value', snapshot => {
                let data = snapshot.val(), html = "", container = document.getElementById('list-' + node);
                if (!data) { 
                    container.innerHTML = "<p style='color:#71717a;'>Belum ada data terekam.</p>";
                    if(node==='database_bab') document.getElementById("statBab").innerText = 0;
                    if(node==='karakter') document.getElementById("statChar").innerText = 0;
                    return; 
                }

                let keys = Object.keys(data);
                if(node==='database_bab') document.getElementById("statBab").innerText = keys.length;
                if(node==='karakter') document.getElementById("statChar").innerText = keys.length;

                keys.forEach(key => {
                    let item = data[key];
                    html += `<div class="render-item">`;
                    konfigurasi.fields.forEach(f => {
                        if(item[f.id]) {
                            html += `<div class="item-field"><b>${f.label}:</b> <span style="white-space:pre-wrap;">${item[f.id]}</span></div>`;
                        }
                    });
                    if(item.waktu) html += `<small style="color:#666; display:block; margin-top:5px;">Disimpan: ${item.waktu}</small>`;
                    // Fitur Hapus Global Aktif untuk semua Kategori
                    html += `<div style="text-align:right; margin-top:10px;"><button class="btn-danger" onclick="hapusItem('${node}','${key}')">Hapus</button></div></div>`;
                });
                container.innerHTML = html;
            });
        }

        function hapusItem(node, key) {
            if (confirm("Hapus data ini secara permanen dari server cloud?")) {
                database.ref(`wiki/${node}/${key}`).remove();
            }
        }

        // AKTIFKAN SINKRONISASI OTOMATIS DATABASE UNTUK SEMUA TAB
        susunanTab.forEach(tab => { if (tab.fields) pasangSinkronisasi(tab.id); });
    </script>
</body>
                                                  </html>
